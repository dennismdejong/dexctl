name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g., v1.0.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}

  verify:
    name: Verify Release
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref_name, 'v')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dexctl-*
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/ || echo "No artifacts downloaded"

      - name: Verify checksums
        run: |
          if [ -f artifacts/checksums.txt ]; then
            cat artifacts/checksums.txt
          fi